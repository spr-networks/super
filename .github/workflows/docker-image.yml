name: Docker Image CI

#on: [ push, pull_request ]
on:
  workflow_run:
    workflows: ["Bump version"]
    types:
      - completed
    branches: [main]
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-images:
    name: Build images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: '0'
      -
        name: Get version from git
        run: echo "RELEASE_VERSION=$(git describe --tags --abbrev=0 | grep -Eo '[0-9]+\.[0-9]+.[0-9]+')" >> $GITHUB_ENV
      -
        name: Set release channel for dev
        run: echo "RELEASE_CHANNEL=-dev" >> $GITHUB_ENV
        if: ${{ github.ref_name == 'dev' }}
      -
        name: Test release tag version and channel
        run: echo "RELEASE_VERSION == $RELEASE_VERSION  CHANNEL == $RELEASE_CHANNEL"
      -
        name: Load reproducible build pins
        run: grep -vE '^[[:space:]]*(#|$)' reproducible.env >> "$GITHUB_ENV"
      -
        name: Compute SOURCE_DATE_EPOCH (commit time) and push flag
        id: repro
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          push=false
          if { [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.ref_name }}" = "main" ]; } \
             || { [ -n "${{ env.RELEASE_CHANNEL }}" ] && [ "${{ github.event_name }}" = "push" ]; }; then
            push=true
          fi
          echo "push=$push" >> "$GITHUB_OUTPUT"
      -
        name: Authenticate to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Authenticate to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=${{ env.BUILDKIT_REF }}
      -
        name: Build and push status
        run: echo "event = ${{ github.event_name }}, ref_name = ${{ github.ref_name }}. push main == push to ghcr"
      -
        name: Build and push with bake action
        id: bake
        uses: docker/bake-action@v7.2.0
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
        with:
          source: .
          sbom: true
          files: |
            docker-compose.yml
            ppp/docker-compose.yml
            wifi_uplink/docker-compose.yml
            dyndns/docker-compose.yml
          # rewrite-timestamp => reproducible digests; gobuilder is build-only (cacheonly)
          set: |
            *.platform=linux/amd64,linux/arm64
            *.args.SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
            *.output=type=image,push=${{ steps.repro.outputs.push }},rewrite-timestamp=true
            gobuilder.output=cacheonly
            dyndns*.context=./dyndns
            wifiuplink*.context=./wifi_uplink
            ppp*.context=./ppp
          provenance: true

      - name: Extract images and digests
        id: extract_info
        run: |
          echo 'IMAGE_INFO<<EOF' >> $GITHUB_OUTPUT
          echo '${{ steps.bake.outputs.metadata }}' | \
          jq -r '[ to_entries[] |
             select(.key != "buildx.build.warnings" and .value["containerimage.digest"]) |
             {
               name: ("ghcr.io/spr-networks/super_" + .key + ":${{ env.RELEASE_VERSION }}${{ env.RELEASE_CHANNEL }}"),
               digest: .value["containerimage.digest"]
             } |
             .name + "@" + .digest
          ] | join(" ")' >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      # Install the cosign tool
      # https://github.com/sigstore/cosign-installer
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign the images with GitHub OIDC Token
        if: ${{ github.event_name == 'workflow_run' && github.ref_name == 'main' || env.RELEASE_CHANNEL != '' && github.event_name == 'push' }}
        run: |
          # sign per-image with retry: ghcr.io intermittently resets the HTTP/2
          # stream (INTERNAL_ERROR) when cosign pushes many sigs in one call
          retry() {
            local n=1 max=5
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "::error::failed after $max attempts: $*"; return 1; fi
              echo "attempt $n failed; retrying in $((n*10))s..."; sleep $((n*10)); n=$((n+1))
            done
          }
          for img in ${{ steps.extract_info.outputs.IMAGE_INFO }}; do
            retry cosign sign --yes "$img"
          done

      # Attest the images with cosign so the provenance is reachable from the
      # registry at the predictable sha256-<digest>.att tag. superd verifies
      # super_* from the registry (no api.github.com rate limit); the
      # attest-build-provenance job below still populates the GitHub store for
      # `gh attestation verify`.
      - name: Attest the images with cosign for registry verification
        if: ${{ github.event_name == 'workflow_run' && github.ref_name == 'main' || env.RELEASE_CHANNEL != '' && github.event_name == 'push' }}
        run: |
          jq -n \
            --arg repo "${{ github.server_url }}/${{ github.repository }}" \
            --arg ref "${{ github.ref }}" \
            --arg sha "${{ github.sha }}" \
            --arg event "${{ github.event_name }}" \
            --arg repoId "${{ github.repository_id }}" \
            --arg ownerId "${{ github.repository_owner_id }}" \
            --arg run "${{ github.run_id }}" \
            --arg attempt "${{ github.run_attempt }}" \
            '{
              buildDefinition: {
                buildType: "https://actions.github.io/buildtypes/workflow/v1",
                externalParameters: {
                  workflow: { ref: $ref, repository: $repo, path: ".github/workflows/docker-image.yml" }
                },
                internalParameters: {
                  github: { event_name: $event, repository_id: $repoId, repository_owner_id: $ownerId }
                },
                resolvedDependencies: [
                  { uri: ("git+" + $repo + "@" + $ref), digest: { gitCommit: $sha } }
                ]
              },
              runDetails: {
                builder: { id: ($repo + "/.github/workflows/docker-image.yml@" + $ref) },
                metadata: { invocationId: ($repo + "/actions/runs/" + $run + "/attempts/" + $attempt) }
              }
            }' > /tmp/spr-provenance.json
          retry() {
            local n=1 max=5
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "::error::failed after $max attempts: $*"; return 1; fi
              echo "attempt $n failed; retrying in $((n*10))s..."; sleep $((n*10)); n=$((n+1))
            done
          }
          for img in ${{ steps.extract_info.outputs.IMAGE_INFO }}; do
            retry cosign attest --yes --type slsaprovenance1 --predicate /tmp/spr-provenance.json "$img"
          done

      - name: Prepare Attestation Matrix
        id: container_digests
        run: |
          matrix=$(echo '${{ steps.bake.outputs.metadata }}' | \
          jq -c '[ to_entries[] |
             select(.key != "buildx.build.warnings" and .value["containerimage.digest"]) |
             {
               name: ("ghcr.io/spr-networks/super_" + .key ),
               digest: .value["containerimage.digest"]
             }
          ]')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
    outputs:
      container_digests: ${{ steps.container_digests.outputs.matrix}}

  attest:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    needs: build-images
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch' }}
    runs-on: self-hosted
    strategy:
      matrix:
        image: ${{ fromJSON(needs.build-images.outputs.container_digests) }}
    steps:
      -
        name: Authenticate to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ matrix.image.name }}
          subject-digest: ${{ matrix.image.digest }}
          push-to-registry: true
